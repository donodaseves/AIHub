<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🤖 AI Hub</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            background: #111111;
            border: 1px solid #222;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
        }

        h2 { text-align: center; font-weight: 300; margin-bottom: 2rem; color: #888; }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            height: 100px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-group button { 
            flex: 1; padding: 10px; cursor: pointer; background: #222; border: none; 
            color: #ccc; border-radius: 6px; font-size: 0.8rem; 
        }
        .btn-group button:hover { background: #333; }

        .ai-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ai-link {
            display: flex; align-items: center; gap: 10px;
            background: #1a1a1a; padding: 12px; border-radius: 8px;
            text-decoration: none; color: white; font-weight: 500;
            border: 1px solid #222;
        }
        .ai-link:hover { border-color: #555; background: #222; }

        .icon { width: 20px; height: 20px; background: #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        .disclaimer {
            margin-top: 30px; font-size: 0.7rem; color: #444; text-align: center;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h2>AI Hub</h2>
    <textarea id="prompt" placeholder="Type prompt here..."></textarea>
    <div class="btn-group">
        <button onclick="copy()">Copy</button>
        <button onclick="document.getElementById('prompt').value=''">Clear</button>
    </div>

    <div class="ai-grid">
        <a href="https://chatgpt.com" class="ai-link"><div class="icon">C</div> ChatGPT</a>
        <a href="https://claude.ai" class="ai-link"><div class="icon">C</div> Claude</a>
        <a href="https://gemini.google.com" class="ai-link"><div class="icon">G</div> Gemini</a>
        <a href="https://chat.mistral.ai" class="ai-link"><div class="icon">M</div> Mistral</a>
        <a href="https://www.perplexity.ai" class="ai-link"><div class="icon">P</div> Perplexity</a>
        <a href="https://x.ai" class="ai-link"><div class="icon">G</div> Grok</a>
        <a href="https://chat.deepseek.com" class="ai-link"><div class="icon">D</div> DeepSeek</a>
    </div>

    <div class="disclaimer">
        Personal project. No support or bug fixes provided.
    </div>
</div>

<script>
    function copy() {
        const t = document.getElementById("prompt");
        t.select(); document.execCommand("copy");
    }
</script>

</body>
</html>
