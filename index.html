<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donodaseves AI Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
  :root {
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --radius: 5px;
    --dur: 160ms;
  }

  html[data-theme="dark"] {
    --bg: #1A1B1D;
    --surface: #212226;
    --surface-alt: #26272C;
    --border: #34363B;
    --border-soft: #2B2C31;
    --text: #E8E9EB;
    --text-muted: #9A9CA3;
    --text-faint: #6B6D74;
    --focus: #6C6E74;
    --primary: #4C7EF0;
    --danger: #C94A3B;
    --shadow: 0 8px 24px rgba(0,0,0,0.45);
  }

  html[data-theme="light"] {
    --bg: #F1F1F0;
    --surface: #FFFFFF;
    --surface-alt: #F5F5F5;
    --border: #DDDEDF;
    --border-soft: #E8E8E9;
    --text: #1E1F22;
    --text-muted: #63656B;
    --text-faint: #94969C;
    --focus: #57585E;
    --primary: #3D63C9;
    --danger: #B33A2C;
    --shadow: 0 8px 24px rgba(20,20,20,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    transition: background var(--dur) ease, color var(--dur) ease;
    padding-bottom: 60px;
  }

  a { color: inherit; text-decoration: none; }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 0;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 28px;
  }

  .brand h1 {
    margin: 0;
    font-family: var(--serif);
    font-size: 23px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color var(--dur), color var(--dur), background var(--dur);
  }
  .icon-btn:hover { border-color: var(--focus); color: var(--text); }
  .icon-btn[aria-pressed="true"] { background: var(--primary); color: #fff; border-color: var(--primary); }

  .more-menu { position: relative; }
  .more-dropdown {
    display: none;
    flex-direction: column;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    min-width: 170px;
    overflow: hidden;
    z-index: 50;
  }
  .more-dropdown.open { display: flex; }
  .more-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    background: transparent;
    border: none;
    text-align: left;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
  }
  .more-item:hover { background: var(--surface-alt); color: var(--text); }
  .more-item.danger { color: var(--danger); }
  .more-item.danger:hover { background: var(--danger); color: #fff; }

  /* ---------- AI Grid ---------- */
  section.deck { margin-bottom: 32px; }

  .ai-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .ai-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent, var(--focus));
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: transform var(--dur) ease, box-shadow var(--dur) ease, border-color var(--dur) ease;
  }
  .ai-card:hover, .ai-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px -6px var(--accent, var(--focus));
  }
  .ai-card:active { transform: translateY(0); }

  .ai-card .name {
    font-size: 15px;
    font-weight: 600;
  }
  .ai-card .desc {
    font-size: 12px;
    color: var(--text-muted);
  }
  .ai-card .keycap {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
    background: var(--surface-alt);
  }

  /* ---------- Draft (full width) ---------- */
  .draft-card { margin-bottom: 16px; }

  /* ---------- Secondary grid (Time / Scratch / Lookup) ---------- */
  .secondary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px) {
    .secondary-grid { grid-template-columns: 1fr; }
  }

  .col-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .panel-col { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .card h2 {
    margin: 0 0 10px;
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .draft-hint {
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--text-faint);
  }

  .draft-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  textarea#draft, textarea#notes, textarea#cleaner {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 10px 12px;
    line-height: 1.5;
  }

  textarea#notes { min-height: 90px; }
  textarea#cleaner { min-height: 110px; }

  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  .draft-controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
  }
  .draft-controls .row { margin-top: 0; }

  .chip {
    display: inline-block;
    position: relative;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color var(--dur), color var(--dur);
  }
  .chip:hover { border-color: var(--focus); color: var(--text); }
  .chip-remove {
    margin-left: 7px;
    color: var(--text-faint);
    font-size: 10px;
    cursor: pointer;
  }
  .chip-remove:hover { color: var(--danger); }

  .mini-input, .mini-textarea {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 10px;
  }
  .mini-textarea { min-height: 70px; resize: vertical; }

  .redirect-add-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .redirect-add-row .mini-input { flex: 1; min-width: 90px; }

  .pm-form {
    padding: 12px 16px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pm-list {
    padding: 4px 16px 10px;
    max-height: 220px;
    overflow-y: auto;
  }
  .pm-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border-soft);
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .pm-item:last-child { border-bottom: none; }
  .pm-item-remove {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    cursor: pointer;
  }
  .pm-item-remove:hover { color: var(--danger); }
  .pm-empty {
    padding: 10px 0;
    font-size: 12px;
    color: var(--text-faint);
  }

  .welcome-box { max-width: 460px; }
  .welcome-body {
    padding: 4px 16px 4px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
  }
  .welcome-body p { margin: 0 0 12px; }
  .welcome-body strong { color: var(--text); }
  .welcome-body a { color: var(--focus); text-decoration: underline; }
  .welcome-actions { padding: 4px 16px 16px; margin-top: 0; }

  .prompt-dropdown {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    max-width: 100%;
    transition: border-color var(--dur), color var(--dur);
  }
  .prompt-dropdown:hover, .prompt-dropdown:focus { border-color: var(--focus); color: var(--text); }
  .prompt-dropdown option { background: var(--surface); color: var(--text); }

  .btn {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color var(--dur), background var(--dur);
  }
  .btn:hover { border-color: var(--focus); }
  .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger-outline { color: var(--danger); border-color: var(--danger); background: transparent; }
  .btn.danger-outline:hover { background: var(--danger); color: #fff; }

  .search-row { display: flex; gap: 8px; }
  input[type="text"]#wiki-input {
    flex: 1;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13.5px;
    padding: 9px 12px;
  }

  .wiki-status {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    min-height: 16px;
  }

  /* ---------- Shortcuts ---------- */
  .shortcut-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    font-size: 12.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-soft);
  }
  .shortcut-row:last-child { border-bottom: none; }
  .shortcut-key {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    background: var(--surface-alt);
  }

  /* ---------- Focus mode ---------- */
  body.focus-mode .draft-card,
  body.focus-mode .secondary-grid {
    display: none;
  }
  body.focus-mode .wrap {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  body.focus-mode .deck {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 0;
    width: 100%;
  }
  body.focus-mode .ai-grid {
    width: 100%;
    max-width: 720px;
  }

  /* ---------- Timer / Stopwatch ---------- */
  .timer-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .timer-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .timer-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .pomodoro-time {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .timer-set-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .timer-set-row input {
    width: 60px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 8px;
    text-align: center;
  }
  .pomodoro-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---------- Command palette ---------- */
  .cmdk-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
    z-index: 1000;
  }
  .cmdk-overlay.open { display: flex; }
  .cmdk-box {
    width: 90%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .cmdk-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--surface-alt);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-family: var(--sans);
    padding: 14px 16px;
  }
  .cmdk-input:focus { outline: none; }
  .cmdk-list { max-height: 320px; overflow-y: auto; }
  .cmdk-item {
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-size: 13.5px;
  }
  .cmdk-item .cmdk-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }
  .cmdk-item.active, .cmdk-item:hover { background: var(--surface-alt); }
  .cmdk-empty {
    padding: 14px 16px;
    font-size: 12.5px;
    color: var(--text-faint);
  }
  .cmdk-hint {
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    border-top: 1px solid var(--border-soft);
  }

  .shortcuts-modal-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 14px 16px 4px;
  }
  .shortcuts-modal-body { padding: 4px 16px 8px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  footer {
    max-width: 980px;
    margin: 30px auto 0;
    padding: 0 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <h1>Donodaseves AI Hub</h1>
    </div>
    <div class="header-controls">
      <a class="icon-btn" id="donate-btn" href="PLACEHOLDER" target="_blank" rel="noopener" title="Support this project">♥ Donate</a>
      <button class="icon-btn" id="cmdk-trigger" title="Command palette (Ctrl+K)">⌘K Search</button>
      <div class="more-menu">
        <button class="icon-btn" id="more-trigger" aria-haspopup="true" aria-expanded="false" title="More options">⋯ More</button>
        <div class="more-dropdown" id="more-dropdown">
          <button class="more-item" id="focus-toggle" aria-pressed="false" type="button">◧ Focus Mode</button>
          <button class="more-item" id="theme-toggle" type="button">☾ Theme</button>
          <button class="more-item" id="shortcuts-trigger" type="button">? Shortcuts</button>
          <button class="more-item danger" id="reset-storage" type="button">⟲ Reset data</button>
        </div>
      </div>
    </div>
  </header>

  <section class="deck">
    <div class="ai-grid" id="ai-grid"></div>
  </section>

  <div class="card draft-card">
    <h2>Draft <span class="draft-hint">press / to jump here</span></h2>
    <textarea id="draft" placeholder="Write or paste a prompt here..."></textarea>
    <div class="draft-meta" id="draft-meta">0 words · 0 characters</div>
    <div class="draft-controls">
      <div class="row">
        <button class="btn primary" id="copy-draft">Copy</button>
        <button class="btn" id="save-draft">Save .txt</button>
        <button class="btn danger-outline" id="clear-draft">Clear</button>
      </div>
      <div class="row" id="prompt-lib">
        <select class="prompt-dropdown" id="dd-start"></select>
        <select class="prompt-dropdown" id="dd-end"></select>
        <select class="prompt-dropdown" id="dd-mood"></select>
        <select class="prompt-dropdown" id="dd-custom"></select>
        <button class="btn" id="prompt-manager-trigger" type="button">+ My Prompts</button>
      </div>
    </div>
  </div>

  <section class="secondary-grid">
    <div class="panel-col">
      <div class="col-label">Time</div>
      <div class="timer-row" id="timer-row">
        <div class="card timer-card">
          <div class="timer-label">Timer</div>
          <div class="pomodoro-time" id="pomo-time">25:00</div>
          <div class="timer-set-row">
            <input type="number" id="pomo-minutes" min="1" max="180" value="25">
            <button class="btn" id="pomo-set" type="button">Set</button>
          </div>
          <div class="pomodoro-controls">
            <button class="btn primary" id="pomo-start" type="button">Start</button>
            <button class="btn danger-outline" id="pomo-reset" type="button">Reset</button>
          </div>
        </div>
        <div class="card timer-card">
          <div class="timer-label">Stopwatch</div>
          <div class="pomodoro-time" id="sw-time">00:00</div>
          <div class="pomodoro-controls">
            <button class="btn primary" id="sw-start" type="button">Start</button>
            <button class="btn danger-outline" id="sw-reset" type="button">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-col">
      <div class="col-label">Scratch</div>
      <div class="card">
        <h2>Notes</h2>
        <textarea id="notes" placeholder="Quick notes..."></textarea>
        <div class="row">
          <button class="btn primary" id="notes-copy">Copy</button>
          <button class="btn" id="notes-save">Save .txt</button>
          <button class="btn danger-outline" id="notes-clear">Clear</button>
        </div>
      </div>

      <div class="card">
        <h2>Clean Text</h2>
        <textarea id="cleaner" placeholder="Paste text to strip extra spaces, blank lines and duplicate words..."></textarea>
        <div class="row">
          <button class="btn primary" id="cleaner-copy">Copy</button>
          <button class="btn" id="cleaner-save">Save .txt</button>
          <button class="btn danger-outline" id="cleaner-clear">Clear</button>
        </div>
      </div>
    </div>

    <div class="panel-col">
      <div class="col-label">Lookup</div>
      <div class="card">
        <h2>Wikipedia</h2>
        <div class="search-row">
          <input type="text" id="wiki-input" placeholder="Search Wikipedia...">
          <button class="btn primary" id="wiki-btn">Search</button>
        </div>
        <div class="wiki-status" id="wiki-status"></div>
      </div>

      <div class="card">
        <h2>Redirects</h2>
        <div class="row" id="redirect-links"></div>
        <div class="redirect-add-row">
          <input type="text" id="redirect-label-input" class="mini-input" placeholder="Label">
          <input type="text" id="redirect-url-input" class="mini-input" placeholder="https://...">
          <button class="btn primary" id="redirect-add-btn" type="button">Add</button>
        </div>
      </div>
    </div>
  </section>
</div>

<footer>Personal project. No support or bug fixes provided.</footer>

<div class="cmdk-overlay" id="cmdk-overlay">
  <div class="cmdk-box">
    <input type="text" id="cmdk-input" class="cmdk-input" placeholder="Jump to a model or link..." autocomplete="off" spellcheck="false">
    <div class="cmdk-list" id="cmdk
